name = "astrobin-analytics"
main = "worker.js"
compatibility_date = "2026-06-29"

# After you run `npx wrangler d1 create astrobin-analytics`, paste the
# database_id it prints into the line below.
[[d1_databases]]
binding = "DB"
database_name = "astrobin-analytics"
database_id = "PASTE_DATABASE_ID_HERE"
